name: Create Fordy's Spotify+🗿 App

on:
  workflow_dispatch:
    inputs:
      CHANGEVERSION:
        description: 'Fordys Spotify Version'
        required: false
      USEACTIONSEEVEE:
        description: 'Get EeveeSpotify from latest build action'
        required: true
        default: false
        type: boolean
      EEVEEVERSION:
        description: 'EeveeSpotify Version'
        required: false
      EEVEEREPO:
        description: 'Override repo for EeveeSpotify'
        required: false

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up variables
      id: setup
      run: |
        echo "EEVEEVERSION=${{ github.event.inputs.EEVEEVERSION }}" >> $GITHUB_ENV
        echo "CHANGEVERSION=${{ github.event.inputs.CHANGEVERSION }}" >> $GITHUB_ENV
        echo "VT_ENABLED=${{ secrets.VIRUSTOTALKEY != '' }}" >> $GITHUB_ENV
        
    - name: Set Workflow URL
      run: |
        echo "WORKFLOWURL=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_ENV

    - name: Set EeveeSpotify Repo if not given
      run: |
        if [ -z "${{ github.event.inputs.EEVEEREPO }}" ]; then
          echo "EEVEEREPO=whoeevee/EeveeSpotifyReborn" >> $GITHUB_ENV
        else
          EEVEEREPO_INPUT=$(echo "${{ github.event.inputs.EEVEEREPO }}" | sed -E 's|https://github.com/([^/]+)/([^/]+)|\1/\2|' | sed 's|^https://github.com/||')
          echo "EEVEEREPO=$EEVEEREPO_INPUT" >> $GITHUB_ENV
        fi

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Cyan
      run: pipx install --force https://github.com/SpotCompiled/pyzule-rw/archive/main.zip

    - name: Set EEVEETAG
      run: |
        if [ -z "${{ github.event.inputs.EEVEEVERSION }}" ]; then
          echo "EEVEEVERSION not provided, fetching latest release tag..."
          EEVEETAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/latest | jq -r .tag_name)
        else
          EEVEEVERSION="${{ github.event.inputs.EEVEEVERSION }}"
          tags=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/tags | jq -r '.[].name')
          for tag in $tags; do
            if [[ $tag == *"$EEVEEVERSION"* ]]; then
              EEVEETAG=$tag
              break
            fi
          done
        fi
        if [ -z "$EEVEETAG" ]; then
          echo "No matching tag found for EEVEEVERSION=${{ github.event.inputs.EEVEEVERSION }}"
          exit 1
        fi
        echo "EEVEETAG=$EEVEETAG" >> $GITHUB_ENV
        echo "Using EeveeSpotify Release Tag: $EEVEETAG"

    - name: Create Build Components folder
      run: mkdir -p "Build Components"

    - name: Download Spotify IPA from private release
      run: |
        ASSET_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/src" | \
          jq -r '.assets[] | select(.name == "src.ipa") | .browser_download_url')
        
        if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" == "null" ]; then
          echo "::error::Could not find src.ipa in release with tag 'src'. Please create a private draft release with this tag and upload the source IPA."
          exit 1
        fi
        echo "Downloading Spotify IPA from private release asset..."
        curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" "$ASSET_URL" -o "Build Components/src.ipa"
        echo "spotifypath=Build Components/src.ipa" >> $GITHUB_ENV

    - name: Download Tweaks
      run: |
        # Download Orion
        ORION_INFO=$(curl -sSL https://repo.chariz.com/Packages | awk 'BEGIN{RS=""; FS="\n"} $1=="Package: dev.theos.orion14" && /Architecture: iphoneos-arm/')
        ORION_FILENAME=$(echo "$ORION_INFO" | grep 'Filename:' | awk '{print $2}')
        curl -LJO "https://repo.chariz.com/$ORION_FILENAME"
        mv $(basename "$ORION_FILENAME") "Build Components/"
        echo "orion=Build Components/$(basename "$ORION_FILENAME")" >> $GITHUB_ENV
        
        # Download Sposify
        SPOSIFY_INFO=$(curl -sSL https://repo.dynastic.co/Packages | awk 'BEGIN{RS=""; FS="\n"} $1=="Package: com.spos" && /Architecture: iphoneos-arm/')
        SPOSIFY_FILENAME=$(echo "$SPOSIFY_INFO" | grep 'Filename:' | awk '{print $2}')
        curl -LJO "https://repo.dynastic.co/$SPOSIFY_FILENAME"
        mv $(basename "$SPOSIFY_FILENAME") "Build Components/"
        echo "sposify=Build Components/$(basename "$SPOSIFY_FILENAME")" >> $GITHUB_ENV
        
        # Download EeveeSpotify
        EEVEE_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ env.EEVEEREPO }}/releases/tags/${{ env.EEVEETAG }} | jq -r '.assets[] | select(.name | startswith("com.eevee.spotify") and endswith("iphoneos-arm.deb")).browser_download_url')
        curl -LJO "$EEVEE_URL"
        mv com.eevee.spotify*.deb "Build Components/"
        echo "eevee-arm=$(ls "Build Components"/com.eevee.spotify*.deb)" >> $GITHUB_ENV
        
        # Download other required debs...
        # This part is simplified, you might need to add other dependencies like SwiftProtobuf etc. if they are not in the main workflow
        # Clone OpenSpotifySafariExtension
        git clone https://github.com/whoeevee/OpenSpotifySafariExtension
        cp -R OpenSpotifySafariExtension/OpenSpotifySafariExtension.appex "Build Components/OpenSpotifySafariExtension.appex"
        echo "OSSEXT=Build Components/OpenSpotifySafariExtension.appex" >> $GITHUB_ENV


    - name: Set Change Version
      id: set-change-version
      run: |
        CHANGEVERSION="${{ github.event.inputs.CHANGEVERSION }}"
        if [ -z "$CHANGEVERSION" ]; then
          latest_tag=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name | sed 's/v//')
          if [ -z "$latest_tag" ]; then
            CHANGEVERSION="1.0.0"
          else
            IFS='.' read -r -a version_parts <<< "$latest_tag"
            patch=$(( ${version_parts[2]} + 1 ))
            CHANGEVERSION="${version_parts[0]}.${version_parts[1]}.$patch"
          fi
        fi
        echo "CHANGEVERSION=$CHANGEVERSION" >> $GITHUB_ENV
        echo "Using Version: $CHANGEVERSION"

    - name: Set Components Path
      run: echo "componentspath=Build Components" >> $GITHUB_ENV
      
    - name: Run Cyan (Sideload)
      run: |
        Cyan -i "${{ env.spotifypath }}" \
             -o "${{ env.componentspath }}/FordySpot_v${{ env.CHANGEVERSION }}.ipa" \
             -v ${{ env.CHANGEVERSION }} \
             -c custom/icon.png \
             -f "${{ env.sposify }}" "${{ env.eevee-arm }}" "${{ env.OSSEXT }}" "${{ env.orion }}" \
             -n "Spotify🗿" \
             -b de.heyfordy.SpotCPlusPlus -u -w
        echo "patchedspotify=${{ env.componentspath }}/FordySpot_v${{ env.CHANGEVERSION }}.ipa" >> $GITHUB_ENV

    - name: Run Cyan (SideStore)
      run: |
        Cyan -i "${{ env.spotifypath }}" \
             -o "${{ env.componentspath }}/FordySpot_v${{ env.CHANGEVERSION }}_sidestore.ipa" \
             -v ${{ env.CHANGEVERSION }} \
             -c custom/icon.png \
             -f "${{ env.sposify }}" "${{ env.eevee-arm }}" "${{ env.OSSEXT }}" "${{ env.orion }}" \
             -n "Spotify🗿" \
             -b com.spotify.client -u -w
        echo "altpatchedspotify=${{ env.componentspath }}/FordySpot_v${{ env.CHANGEVERSION }}_sidestore.ipa" >> $GITHUB_ENV
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ env.CHANGEVERSION }}"
        name: "Spotify🗿 v${{ env.CHANGEVERSION }}"
        draft: false
        prerelease: false
        files: |
          ${{ env.patchedspotify }}
          ${{ env.altpatchedspotify }}

